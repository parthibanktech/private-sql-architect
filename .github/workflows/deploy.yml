name: CI/CD Pipeline for Private SQL Architect

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Syntax (Flake8 or similar)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Docker Image
        run: |
          docker build -t private-sql-architect:latest .

  deploy-to-render:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deployment
        # You need to add RENDER_DEPLOY_HOOK_URL in your GitHub repository secrets
        # Once Render connects to your Git repo, it gives you a webhook URL for deployments.
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Render webhook not set, skipping explicit trigger (Render might auto-deploy on push)."
          else
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          fi
